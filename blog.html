<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog | Toyama Univ. MR Project</title>
    <meta name="description" content="富山大学MRプロジェクトのブログ一覧。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand-wrap">
        <p class="brand-sub">University of Toyama</p>
        <h1>MR Project</h1>
      </div>
      <nav class="site-nav" aria-label="Primary Navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="blog.html" aria-current="page">Blog</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main class="simple-main">
      <p class="crumb"><a class="text-link" href="index.html">Home</a> / Blog</p>
      <section class="panel" aria-labelledby="blog-title">
        <div class="section-head">
          <h2 id="blog-title">Blog</h2>
          <p>Latest First / 15 posts per page</p>
        </div>
        <p class="blog-note">投稿は新しい順に表示されます。タグで振り分けて表示できます。</p>
        <div id="blog-tag-filter" class="tag-filter" aria-label="Blog Tag Filter"></div>
        <div
          id="blog-list"
          class="blog-list"
          data-page-size="15"
          data-paginate="true"
          data-tag-filter="true"
          aria-live="polite"
        ></div>
        <div id="blog-pagination" class="pager" aria-label="Blog Pagination"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 Toyama University MR Project</p>
    </footer>

    <script src="src/blog-data.js"></script>
    <script src="src/script.js"></script>
  </body>
</html>
